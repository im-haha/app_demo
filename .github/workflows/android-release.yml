name: Mobile Release Android APK

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "发布标签（例如 v1.0.1）"
        required: true
        type: string
      release_name:
        description: "Release 标题（可选）"
        required: false
        type: string
      release_notes:
        description: "Release 说明（可选）"
        required: false
        type: string

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Resolve release metadata
        id: meta
        run: |
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            TAG="${{ github.event.inputs.tag }}"
            NAME="${{ github.event.inputs.release_name }}"
            NOTES="${{ github.event.inputs.release_notes }}"
          else
            TAG="${GITHUB_REF_NAME}"
            NAME=""
            NOTES=""
          fi

          if [[ -z "${TAG}" ]]; then
            echo "::error::缺少发布标签 tag"
            exit 1
          fi

          if [[ -z "${NAME}" ]]; then
            NAME="Mobile ${TAG}"
          fi

          HAS_NOTES=false
          if [[ -n "${NOTES}" ]]; then
            HAS_NOTES=true
          fi

          echo "tag=${TAG}" >> "${GITHUB_OUTPUT}"
          echo "name=${NAME}" >> "${GITHUB_OUTPUT}"
          echo "has_notes=${HAS_NOTES}" >> "${GITHUB_OUTPUT}"
          {
            echo "notes<<EOF"
            echo "${NOTES}"
            echo "EOF"
          } >> "${GITHUB_OUTPUT}"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: account-app-rn/package-lock.json

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Install dependencies
        working-directory: account-app-rn
        run: npm ci --prefer-offline --no-audit --progress=false

      - name: Prepare Android signing files
        working-directory: account-app-rn/android
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          missing=0
          for var in ANDROID_KEYSTORE_BASE64 ANDROID_KEYSTORE_PASSWORD ANDROID_KEY_ALIAS; do
            if [[ -z "${!var}" ]]; then
              echo "::error::缺少仓库 Secret: ${var}"
              missing=1
            fi
          done

          if [[ "${missing}" -ne 0 ]]; then
            exit 1
          fi

          echo "${ANDROID_KEYSTORE_BASE64}" | base64 --decode > app/release.keystore

          CANDIDATE_KEY_PASSWORDS=()
          if [[ -n "${ANDROID_KEY_PASSWORD}" ]]; then
            CANDIDATE_KEY_PASSWORDS+=("${ANDROID_KEY_PASSWORD}")
          fi
          if [[ "${ANDROID_KEYSTORE_PASSWORD}" != "${ANDROID_KEY_PASSWORD}" ]]; then
            CANDIDATE_KEY_PASSWORDS+=("${ANDROID_KEYSTORE_PASSWORD}")
          fi

          TMP_DIR="$(mktemp -d)"
          trap 'rm -rf "${TMP_DIR}"' EXIT
          echo "keystore-check" > "${TMP_DIR}/check.txt"
          (
            cd "${TMP_DIR}"
            jar --create --file check.jar check.txt > /dev/null
          )

          RESOLVED_KEY_PASSWORD=""
          for candidate in "${CANDIDATE_KEY_PASSWORDS[@]}"; do
            if jarsigner \
              -keystore app/release.keystore \
              -storepass "${ANDROID_KEYSTORE_PASSWORD}" \
              -keypass "${candidate}" \
              "${TMP_DIR}/check.jar" \
              "${ANDROID_KEY_ALIAS}" > /dev/null 2>&1; then
              RESOLVED_KEY_PASSWORD="${candidate}"
              break
            fi
          done

          if [[ -z "${RESOLVED_KEY_PASSWORD}" ]]; then
            echo "::error::签名校验失败：无法读取 alias=${ANDROID_KEY_ALIAS} 的私钥。请检查 ANDROID_KEY_PASSWORD，若为 PKCS12 且未单独设置 key 密码，通常应与 ANDROID_KEYSTORE_PASSWORD 一致。"
            exit 1
          fi

          if [[ -n "${ANDROID_KEY_PASSWORD}" && "${RESOLVED_KEY_PASSWORD}" != "${ANDROID_KEY_PASSWORD}" ]]; then
            echo "::warning::ANDROID_KEY_PASSWORD 校验失败，已回退使用 ANDROID_KEYSTORE_PASSWORD。建议修正仓库 Secret，避免后续混淆。"
          fi

          {
            echo "storeFile=app/release.keystore"
            echo "storePassword=${ANDROID_KEYSTORE_PASSWORD}"
            echo "keyAlias=${ANDROID_KEY_ALIAS}"
            echo "keyPassword=${RESOLVED_KEY_PASSWORD}"
          } > keystore.properties

      - name: Prepare Sentry upload config
        working-directory: account-app-rn/android
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
          SENTRY_URL: ${{ secrets.SENTRY_URL }}
        run: |
          missing=0
          for var in SENTRY_AUTH_TOKEN SENTRY_ORG SENTRY_PROJECT; do
            if [[ -z "${!var}" ]]; then
              echo "::error::缺少仓库 Secret: ${var}"
              missing=1
            fi
          done

          if [[ "${missing}" -ne 0 ]]; then
            echo "::error::Sentry 上传配置不完整，已终止 release 构建。"
            exit 1
          fi

          {
            echo "defaults.url=${SENTRY_URL:-https://sentry.io/}"
            echo "auth.token=${SENTRY_AUTH_TOKEN}"
            echo "defaults.org=${SENTRY_ORG}"
            echo "defaults.project=${SENTRY_PROJECT}"
          } > sentry.properties
          echo "SENTRY_DISABLE_AUTO_UPLOAD=false" >> "${GITHUB_ENV}"

      - name: Build release APK
        working-directory: account-app-rn/android
        env:
          ORG_GRADLE_PROJECT_reactNativeArchitectures: armeabi-v7a,arm64-v8a
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
          SENTRY_URL: ${{ secrets.SENTRY_URL }}
        run: |
          set -eo pipefail
          chmod +x ./gradlew
          ./gradlew :app:assembleRelease \
            --parallel \
            --build-cache \
            | tee "${RUNNER_TEMP}/android-assemble-release.log"

      - name: Verify Sentry symbolication artifacts
        working-directory: account-app-rn/android
        run: |
          set -eo pipefail

          MAPPING_FILE="app/build/outputs/mapping/release/mapping.txt"
          if [[ ! -s "${MAPPING_FILE}" ]]; then
            echo "::error::未找到或为空的 Proguard 映射文件: ${MAPPING_FILE}"
            exit 1
          fi

          JS_MAP_FILE="$(find app/build -type f \( -name 'index.android.bundle.map' -o -name 'index.android.bundle.packager.map' \) | head -n 1 || true)"
          if [[ -z "${JS_MAP_FILE}" ]]; then
            echo "::error::未找到 JS Source Map（index.android.bundle.map / index.android.bundle.packager.map）。"
            exit 1
          fi

          if ! grep -qi "sentry" "${RUNNER_TEMP}/android-assemble-release.log"; then
            echo "::warning::构建日志中未匹配到 sentry 关键字，请在本次 run 的 Debug Artifacts 中复核 assemble 日志。"
          fi

          {
            echo "### Sentry 校验"
            echo "- Proguard 映射: \`${MAPPING_FILE}\`"
            echo "- JS Source Map: \`${JS_MAP_FILE}\`"
            echo "- 以上文件已生成，可用于 release 报错定位与源码映射。"
          } >> "${GITHUB_STEP_SUMMARY}"

      - name: Rename APK artifact
        id: artifact
        run: |
          SRC="account-app-rn/android/app/build/outputs/apk/release/app-release.apk"
          if [[ ! -f "${SRC}" ]]; then
            echo "::error::未找到 APK 文件: ${SRC}"
            exit 1
          fi

          SAFE_TAG="${{ steps.meta.outputs.tag }}"
          SAFE_TAG="${SAFE_TAG//\//-}"
          DEST="account-app-rn/android/app/build/outputs/apk/release/accountapp-${SAFE_TAG}-android.apk"
          cp "${SRC}" "${DEST}"
          echo "path=${DEST}" >> "${GITHUB_OUTPUT}"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk-${{ steps.meta.outputs.tag }}
          path: ${{ steps.artifact.outputs.path }}
          if-no-files-found: error

      - name: Upload Android debug artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-debug-files-${{ steps.meta.outputs.tag }}
          if-no-files-found: warn
          path: |
            ${{ runner.temp }}/android-assemble-release.log
            account-app-rn/android/app/build/generated/sourcemaps/**
            account-app-rn/android/app/build/intermediates/sourcemaps/**
            account-app-rn/android/app/build/intermediates/assets/release/*.map
            account-app-rn/android/app/build/outputs/mapping/**
            account-app-rn/android/app/build/outputs/native-debug-symbols/**
            account-app-rn/android/app/build/outputs/logs/**

      - name: Generate structured release notes
        if: steps.meta.outputs.has_notes != 'true'
        id: notes
        env:
          RELEASE_TAG: ${{ steps.meta.outputs.tag }}
          RELEASE_NAME: ${{ steps.meta.outputs.name }}
        run: |
          set -eo pipefail

          NOTES_FILE="${RUNNER_TEMP}/release-notes.md"
          PREV_TAG="$(git tag --list 'v*' --sort=-creatordate | grep -Fxv "${RELEASE_TAG}" | head -n 1 || true)"
          declare -a COMMITS=()

          if [[ -n "${PREV_TAG}" ]]; then
            while IFS= read -r line || [[ -n "${line}" ]]; do
              COMMITS+=("${line}")
            done < <(git log --pretty=format:'%s' "${PREV_TAG}..${GITHUB_SHA}")
            COMPARE_URL="https://github.com/${GITHUB_REPOSITORY}/compare/${PREV_TAG}...${RELEASE_TAG}"
          else
            while IFS= read -r line || [[ -n "${line}" ]]; do
              COMMITS+=("${line}")
            done < <(git log --pretty=format:'%s' --max-count=200)
            COMPARE_URL=""
          fi

          TOTAL="${#COMMITS[@]}"
          if [[ "${TOTAL}" -eq 0 ]]; then
            while IFS= read -r line || [[ -n "${line}" ]]; do
              COMMITS+=("${line}")
            done < <(git log --pretty=format:'%s' -n 1 "${GITHUB_SHA}")
            TOTAL="${#COMMITS[@]}"
          fi
          declare -a ADDED=()
          declare -a FIXED=()
          declare -a IMPROVED=()
          declare -a OTHER=()

          for msg in "${COMMITS[@]}"; do
            if [[ -z "${msg}" ]]; then
              continue
            fi

            clean="${msg}"
            if [[ "${msg}" == *": "* ]]; then
              clean="${msg#*: }"
            fi
            clean="${clean#"${clean%%[![:space:]]*}"}"

            lower="$(printf '%s' "${msg}" | tr '[:upper:]' '[:lower:]')"

            if [[ "${lower}" == feat:* ]] || [[ "${lower}" == feat\(*\):* ]] || [[ "${lower}" == feature:* ]] || [[ "${lower}" == feature\(*\):* ]] || [[ "${msg}" == *新增* ]] || [[ "${msg}" == *添加* ]] || [[ "${msg}" == *支持* ]] || [[ "${msg}" == *接入* ]]; then
              ADDED+=("${clean}")
            elif [[ "${lower}" == fix:* ]] || [[ "${lower}" == fix\(*\):* ]] || [[ "${lower}" == hotfix:* ]] || [[ "${lower}" == hotfix\(*\):* ]] || [[ "${lower}" == *bug* ]] || [[ "${msg}" == *修复* ]] || [[ "${msg}" == *崩溃* ]] || [[ "${msg}" == *异常* ]] || [[ "${msg}" == *失败* ]]; then
              FIXED+=("${clean}")
            elif [[ "${lower}" == perf:* ]] || [[ "${lower}" == perf\(*\):* ]] || [[ "${lower}" == refactor:* ]] || [[ "${lower}" == refactor\(*\):* ]] || [[ "${lower}" == optimize:* ]] || [[ "${lower}" == optimize\(*\):* ]] || [[ "${lower}" == style:* ]] || [[ "${lower}" == style\(*\):* ]] || [[ "${lower}" == chore:* ]] || [[ "${lower}" == chore\(*\):* ]] || [[ "${msg}" == *优化* ]] || [[ "${msg}" == *重构* ]] || [[ "${msg}" == *改进* ]] || [[ "${msg}" == *性能* ]] || [[ "${msg}" == *体验* ]]; then
              IMPROVED+=("${clean}")
            else
              OTHER+=("${clean}")
            fi
          done

          {
            echo "# ${RELEASE_NAME}"
            echo
            echo "## 重要说明"
            if [[ -n "${PREV_TAG}" ]]; then
              echo "- 本次版本从 \`${PREV_TAG}\` 升级到 \`${RELEASE_TAG}\`。"
              echo "- 共包含 ${TOTAL} 条提交，建议尽快升级。"
              echo "- [查看完整提交差异](${COMPARE_URL})"
            else
              echo "- 这是当前仓库的首个自动结构化发布说明。"
              echo "- 建议安装前先备份本地数据。"
            fi
            echo

            echo "## 新增功能"
            if [[ "${#ADDED[@]}" -eq 0 ]]; then
              echo "- 无"
            else
              for item in "${ADDED[@]}"; do
                echo "- ${item}"
              done
            fi
            echo

            echo "## 修复问题"
            if [[ "${#FIXED[@]}" -eq 0 ]]; then
              echo "- 无"
            else
              for item in "${FIXED[@]}"; do
                echo "- ${item}"
              done
            fi
            echo

            echo "## 优化改进"
            if [[ "${#IMPROVED[@]}" -eq 0 ]]; then
              echo "- 无"
            else
              for item in "${IMPROVED[@]}"; do
                echo "- ${item}"
              done
            fi
            echo

            echo "## 其他变更"
            if [[ "${#OTHER[@]}" -eq 0 ]]; then
              echo "- 无"
            else
              for item in "${OTHER[@]}"; do
                echo "- ${item}"
              done
            fi
            echo

            echo "## 下载地址"
            echo
            echo "### iOS"
            echo "- iPhone 模拟器包: [accountapp-${RELEASE_TAG}-ios-iphone-simulator.app.zip](https://github.com/${GITHUB_REPOSITORY}/releases/download/${RELEASE_TAG}/accountapp-${RELEASE_TAG}-ios-iphone-simulator.app.zip)"
            echo "- iPad 模拟器包: [accountapp-${RELEASE_TAG}-ios-ipad-simulator.app.zip](https://github.com/${GITHUB_REPOSITORY}/releases/download/${RELEASE_TAG}/accountapp-${RELEASE_TAG}-ios-ipad-simulator.app.zip)"
            echo "- 说明: 以上为模拟器包（Simulator），用于调试验证，不可直接安装到真机。"
            echo "- 若未看到 iOS 文件，请检查工作流 \`iOS Release Simulator Artifacts\` 是否执行成功。"
            echo
            echo "### Android"
            echo "- 通用 APK（Phone/Pad，推荐）: [accountapp-${RELEASE_TAG}-android.apk](https://github.com/${GITHUB_REPOSITORY}/releases/download/${RELEASE_TAG}/accountapp-${RELEASE_TAG}-android.apk)"
            echo "- 备用入口: [Release 页面](https://github.com/${GITHUB_REPOSITORY}/releases/tag/${RELEASE_TAG})"
            echo
            echo "### Windows"
            echo "- 当前版本未提供 Windows 安装包。"
            echo
            echo "### macOS"
            echo "- 当前版本未提供 macOS 安装包。"
            echo
            echo "### Linux"
            echo "- 当前版本未提供 Linux 安装包。"
            echo
            echo "### 安装提示"
            echo "- 首次安装时若系统提示风险，请确认来源后继续安装。"
            echo "- 建议升级前先备份关键数据。"
          } > "${NOTES_FILE}"

          echo "body_path=${NOTES_FILE}" >> "${GITHUB_OUTPUT}"

      - name: Publish release with custom notes
        if: steps.meta.outputs.has_notes == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          target_commitish: ${{ github.sha }}
          name: ${{ steps.meta.outputs.name }}
          body: ${{ steps.meta.outputs.notes }}
          files: ${{ steps.artifact.outputs.path }}

      - name: Publish release with generated notes
        if: steps.meta.outputs.has_notes != 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          target_commitish: ${{ github.sha }}
          name: ${{ steps.meta.outputs.name }}
          body_path: ${{ steps.notes.outputs.body_path }}
          files: ${{ steps.artifact.outputs.path }}

      - name: Cleanup signing files
        if: always()
        working-directory: account-app-rn/android
        run: rm -f keystore.properties app/release.keystore sentry.properties
